    <style>
        :root { --primary: #ffcc00;
--bg: #121212; --card-bg: #1e1e1e; --text: #ffffff; }
        body { background-color: #2c2c2c; color: var(--text);
font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding-bottom: 120px; transition: background-color 0.5s ease; overflow-x: hidden;
}

        /* Écran de chargement */
        #loading-screen {
            position: fixed;
top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999;
}
        .spinner {
            width: 50px;
height: 50px; border: 5px solid #333; 
            border-top: 5px solid var(--primary); border-radius: 50%; 
            animation: spin 1s linear infinite; margin-bottom: 20px;
}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg);
} }

        /* Zoom Image Plat */
        .img-plat-client { width: 60px;
height: 60px; border-radius: 5px; object-fit: cover; transition: all 0.3s ease; cursor: pointer; z-index: 1;
}
        .img-plat-client.zoom-image {
            position: fixed;
top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90vw; height: auto; max-height: 80vh; border-radius: 15px;
            z-index: 5000;
box-shadow: 0 0 100px rgba(0,0,0,0.9);
            outline: 5000px solid rgba(0,0,0,0.8);
        }

        #notification-bar {
            width: 100%;
min-height: 55px; background-color: #000; display: flex; align-items: center; 
            justify-content: center; position: sticky; top: 0; z-index: 4000; border-bottom: 3px solid var(--primary);
color: var(--primary); font-weight: bold; text-align: center; padding: 5px 15px; box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-size: 1rem; text-transform: uppercase;
}

        /* Barre de statut commande client */
        #order-status-bar {
            display: none;
            width: 100%;
            background: #111;
            border-bottom: 2px solid #333;
            padding: 8px 15px;
            box-sizing: border-box;
            font-size: 0.8rem;
            align-items: center;
            gap: 8px;
            position: sticky;
            top: 55px;
            z-index: 3900;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            animation: pulse-dot 1.5s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
}
        .btn-pro-header { background-color: var(--primary); color: #000; border: none; padding: 8px 15px;
border-radius: 5px; font-weight: bold; cursor: pointer; }

        .numpad-container { 
            display: none;
padding: 25px; background: #1a1a1a; border: 2px solid var(--primary); text-align: center; 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
z-index: 3000; border-radius: 20px;

        .pin-display { background: #000; color: var(--primary); font-size: 1.8rem; padding: 15px; border-radius: 12px;

        .num-btn { background: #333; color: white; border: 1px solid #444; width: 65px;

        .btn-menu-pro { width: 100%;

    <script>
        // --- CONFIG FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyD4ekJLYuL5QTsroQj_QlOUPohDwhlQ14s",
            authDomain: "koul-ec357.firebaseapp.com",
            databaseURL: "https://koul-ec357-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "koul-ec357",
            storageBucket: "koul-ec357.firebasestorage.app",
            messagingSenderId: "461125460557",
            appId: "1:461125460557:web:31b3f4366ec233bf9b3204"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let restaurants = [], livreurs = [], adminHistory = [], cart = {}, currentRes = null, currentLivreur = null, currentPin = "", clientTempPin = "", deliveryTempPin = "";
        let pendingResId = null, pendingOrderId = null;
        let promoMessage = "BIENVENUE";

        // Suivi commande client
        let clientOrderTracking = null;

        // Données notation en attente
        let pendingRatingData = null; // { res, order }
        let ratingResVal = 0, ratingLivVal = 0;

        function calcAvg(arr) {
            if(!arr || arr.length === 0) return "N/A";
            const sum = arr.reduce((a, b) => a + b, 0);
            return (sum / arr.length).toFixed(1);
        }

        // --- SYNCHRONISATION TEMPS RÉEL ---
        let cloudWriteChain = Promise.resolve();
        let stopProOrdersWatch = null;
        let knownProOrderIds = new Set();

        function resIndex(resId) {
            return restaurants.findIndex(r => Number(r.id) === Number(resId));
        }

        function pushRestaurants() {
            return enqueueCloudWrite(() => db.ref('cloud_koul/restaurants').set(restaurants || []));
        }

        function saveRestaurant(res) {
            const i = resIndex(res.id);
            if (i < 0) return cloudWriteChain;
            restaurants[i] = res;
            return enqueueCloudWrite(() => db.ref(`cloud_koul/restaurants/${i}`).set(res));
        }

        function pushLivreurs() {
            return enqueueCloudWrite(() => db.ref('cloud_koul/livreurs').set(livreurs || []));
        }

        function saveLivreur(liv) {
            const i = livreurs.findIndex(l => Number(l.id) === Number(liv.id));
            if (i < 0) return cloudWriteChain;
            livreurs[i] = liv;
            return enqueueCloudWrite(() => db.ref(`cloud_koul/livreurs/${i}`).set(liv));
        }

        function pushHistory() {
            return enqueueCloudWrite(() => db.ref('cloud_koul/adminHistory').set(adminHistory || []));
        }

        function pushPromo() {
            return enqueueCloudWrite(() => db.ref('cloud_koul/promoMessage').set(promoMessage || "BIENVENUE"));
        }

        function enqueueCloudWrite(task) {
            cloudWriteChain = cloudWriteChain.then(task).catch(err => console.error('Firebase write', err));
            return cloudWriteChain;
        }

        function onRestaurantsUpdated() {
            document.getElementById('loading-screen').style.display = 'none';
            if (currentRes) {
                const updatedRes = restaurants.find(r => Number(r.id) === Number(currentRes.id));
                if (updatedRes) currentRes = updatedRes;
            }
            updateClientOrderStatus();
            refreshCurrentView();
            if (document.getElementById('view-restaurants').classList.contains('active')) {
                init();
            }
        }

        function onLivreursUpdated() {
            if (currentLivreur) {
                const updatedLiv = livreurs.find(l => Number(l.id) === Number(currentLivreur.id));
                if (updatedLiv) currentLivreur = updatedLiv;
            }
            refreshCurrentView();
        }

        function bindCloudListeners() {
            db.ref('cloud_koul/restaurants').on('value', (snapshot) => {
                restaurants = snapshot.val() || [];
                onRestaurantsUpdated();
            });
            db.ref('cloud_koul/livreurs').on('value', (snapshot) => {
                livreurs = snapshot.val() || [];
                onLivreursUpdated();
            });
            db.ref('cloud_koul/adminHistory').on('value', (snapshot) => {
                adminHistory = snapshot.val() || [];
                if (document.getElementById('view-admin-space').classList.contains('active')) {
                    renderAdminHistory();
                }
            });
            db.ref('cloud_koul/promoMessage').on('value', (snapshot) => {
                promoMessage = snapshot.val() || 'BIENVENUE';
                document.getElementById('notif-message').innerText = promoMessage;
            });
        }

        function startProOrdersWatch(resId) {
            if (stopProOrdersWatch) stopProOrdersWatch();
            const idx = resIndex(resId);
            if (idx < 0) return;
            knownProOrderIds = new Set((currentRes && currentRes.orders ? currentRes.orders : []).map(o => o.id));
            const ordersRef = db.ref(`cloud_koul/restaurants/${idx}/orders`);
            const handler = (snap) => {
                const orders = snap.val() || [];
                if (!currentRes || Number(currentRes.id) !== Number(resId)) return;
                const newOnes = orders.filter(o => o && o.status === 'new' && !knownProOrderIds.has(o.id));
                orders.forEach(o => { if (o && o.id) knownProOrderIds.add(o.id); });
                currentRes.orders = orders;
                if (document.getElementById('view-pro-space').classList.contains('active')) {
                    renderProOrders();
                    if (newOnes.length > 0) {
                        vibrate([100, 50, 100]);
                        setNotif('NOUVELLE COMMANDE !');
                    }
                }
            };
            ordersRef.on('value', handler);
            stopProOrdersWatch = () => ordersRef.off('value', handler);
        }

        function refreshCurrentView() {
            if(document.getElementById('view-admin-space').classList.contains('active')) {
                renderAdminResList();
                renderAdminLivList(); renderAdminHistory();
            }
            if(document.getElementById('view-pro-space').classList.contains('active') && currentRes) {
                renderProOrders();
                renderProPlats(); renderResHistory();
            }
            if(document.getElementById('view-livreur-space').classList.contains('active') && currentLivreur) {
                renderLivreurOrders();
                renderLivreurHistory();
            }
        }

        function processLogin() {

            toggleLoginArea();

                const r = restaurants.find(x => x.code === pin), l = livreurs.find(x => x.code === pin);

        function logAdminEvent(type, details) { 
            const now = new Date();
            adminHistory.unshift({ 
                type, 
                details, 
                time: String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0'), 
                date: now.toLocaleDateString() 
            });
            setTimeout(() => pushHistory(), 50);
        }
        function logResEvent(res, status, order) { 
            if(!res.eventHistory) res.eventHistory = [];
            const now = new Date();
            const timeStr = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
            res.eventHistory.unshift({ 
                status, 
                client: order.client, 
                items: order.itemsText || (order.items ? order.items.join(', ') : ''), 
                time: timeStr, 
                date: now.toLocaleDateString() 
            }); 
            logAdminEvent(res.name.toUpperCase(), `${status} - Client: ${order.client}`);
            saveRestaurant(res);
        }

        function openEditResModal(resId) {
            const res = restaurants.find(r => r.id === resId);
            if(!res) return;
            editingResId = resId;
            document.getElementById('edit-res-name').value = res.name || '';
            document.getElementById('edit-res-code').value = res.code || '';
            document.getElementById('edit-res-dur').value = '';
            document.getElementById('edit-res-img').value = '';
            document.getElementById('modal-edit-res').style.display = 'block';
            document.getElementById('modal-overlay').style.display = 'block';
        }

        function closeEditResModal() {
            document.getElementById('modal-edit-res').style.display = 'none';
            document.getElementById('modal-overlay').style.display = 'none';
            editingResId = null;
        }

        function saveEditRes() {
            const res = restaurants.find(r => r.id === editingResId);
            if(!res) return;
            const newName = document.getElementById('edit-res-name').value.trim();
            const newCode = document.getElementById('edit-res-code').value.trim();
            const newDur = document.getElementById('edit-res-dur').value;
            const imgFile = document.getElementById('edit-res-img').files[0];

            const applyChanges = (imgData) => {
                const oldName = res.name;
                if(newName) res.name = newName;
                if(newCode) res.code = newCode;
                if(newDur) res.expiry = Date.now() + (parseInt(newDur) * 24 * 60 * 60 * 1000);
                if(imgData) res.img = imgData;
                logAdminEvent("ADMIN", `Resto modifié: ${oldName} → ${res.name}`);
                saveRestaurant(res);
                renderAdminResList();
                setNotif("RESTO MIS À JOUR");
                closeEditResModal();
            };

            if(imgFile) {
                const r = new FileReader();
                r.onload = (e) => applyChanges(e.target.result);
                r.readAsDataURL(imgFile);
            } else {
                applyChanges(null);
            }
        }

        function cancelOrder(oid) { 
            const idx = currentRes.orders.findIndex(x => x.id === oid);
            if(idx > -1) {
                const o = currentRes.orders[idx];
                o.rawItems.forEach(item => {
                    const plat = currentRes.plats.find(p => p.id === item.id);
                    if(plat) plat.stock += item.qte;
                });
                logResEvent(currentRes, "COMMANDE REJETÉE", o); 
                currentRes.orders.splice(idx, 1);
                renderProOrders(); setNotif("COMMANDE ANNULÉE (STOCK RENDU)"); saveRestaurant(currentRes);

        // --- LIVREUR ---
        function hasActiveOrder(livId) {
            let active = false;
            restaurants.forEach(res => {
                if(res.orders && res.orders.some(o => o.livId === livId && o.status === 'shipping')) active = true;
            });
            return active;
        }

        function renderLivreurOrders() {
            const l = document.getElementById('liv-orders');
            l.innerHTML = '<h3>Missions</h3>';
            const isBusy = hasActiveOrder(currentLivreur.id);
            const myHiddenOrders = JSON.parse(localStorage.getItem(`koul_hidden_orders_${currentLivreur.id}`) || '[]');
            restaurants.forEach(res => {
                if(res.orders) res.orders.forEach(o => {
                    if(!myHiddenOrders.includes(o.id) && (o.status === 'waiting' || (o.status === 'shipping' && o.livId === currentLivreur.id))) {
                        const canTake = !isBusy && o.status === 'waiting';
                        const isBeingShippedByMe = o.status === 'shipping' && o.livId === currentLivreur.id;

                        l.innerHTML += `
                            <div class="order-card-pro">
                                <b style="color:var(--primary)">${res.name}</b><br>
                                <div class="order-actions">
                                    ${canTake ? `<button class="btn-finish" onclick="takeOrd(${res.id}, ${o.id})">PRENDRE</button>` : ''}
                                    ${o.status === 'waiting' ? `<button class="btn-reject" onclick="ignoreOrd(${o.id})">MASQUER</button>` : ''}
                                    ${isBeingShippedByMe ? `<a href="tel:${o.tel}" class="btn-call">APPELER</a>` : ''}
                                    ${isBeingShippedByMe ? `<button class="btn-finish" style="background:#28a745" onclick="openValPin(${res.id}, ${o.id})">VALIDER LIVRAISON</button>` : ''}
                                </div>
                                ${isBusy && o.status === 'waiting' ? '<small style="color:orange">Terminez votre livraison actuelle pour en prendre une autre.</small>' : ''}
                            </div>`;
                    }
                });
            });
        }

        function takeOrd(rid, oid) {
            if(hasActiveOrder(currentLivreur.id)) return setNotif("VOUS AVEZ DÉJÀ UNE LIVRAISON");
            const r = restaurants.find(x=>x.id===rid); const o = r.orders.find(x=>x.id===oid);
            o.status = 'shipping'; o.livId = currentLivreur.id; o.livName = currentLivreur.name;
            logResEvent(r, `PRISE PAR LIVREUR (${currentLivreur.name})`, o);
            setNotif("COMMANDE RÉCUPÉRÉE"); renderLivreurOrders(); saveRestaurant(r);
        }

        function ignoreOrd(oid) { 
            const storageKey = `koul_hidden_orders_${currentLivreur.id}`;
            let myHiddenOrders = JSON.parse(localStorage.getItem(storageKey) || '[]');
            myHiddenOrders.push(oid); 
            localStorage.setItem(storageKey, JSON.stringify(myHiddenOrders));
            logAdminEvent("LIVREUR", `${currentLivreur.name} a masqué une commande.`);
            renderLivreurOrders(); 
            setNotif("COMMANDE MASQUÉE POUR VOUS");
        }

        function openValPin(rid, oid) { pendingResId = rid; pendingOrderId = oid;
            deliveryTempPin = ""; document.getElementById('delivery-pin-view').innerText = ""; document.getElementById('delivery-validation-container').style.display = 'block'; }
        function closeDeliveryPin() { document.getElementById('delivery-validation-container').style.display = 'none'; }
        
        function confirmDelivery() {
            const r = restaurants.find(x=>x.id===pendingResId);
            const idx = r.orders.findIndex(x=>x.id===pendingOrderId); const o = r.orders[idx];
            if(deliveryTempPin === o.pin) {
                const final = r.orders.splice(idx, 1)[0];
                logResEvent(r, `LIVRÉE PAR ${currentLivreur ? currentLivreur.name : 'PRO'}`, final);
                if(currentLivreur) { 
                    if(!currentLivreur.history) currentLivreur.history = [];
                    const now = new Date();
                    currentLivreur.history.push({
                        resName: r.name, 
                        date: now.toLocaleDateString(), 
                        time: String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0')
                    }); 
                    saveLivreur(currentLivreur);
                }
                setNotif("LIVRAISON VALIDÉE !");
                saveRestaurant(r);
                closeDeliveryPin();
                if(currentLivreur) { renderLivreurOrders(); renderLivreurHistory(); }
                if(currentRes) { renderProOrders(); renderResHistory(); }
            } else { vibrate([50, 50]); setNotif("CODE INCORRECT"); }
        }

        function renderLivreurHistory() { 
            const l = document.getElementById('liv-hist');
            l.innerHTML = '<h4>Historique (Récent en haut)</h4>'; 
            if(currentLivreur.history) {
                const sortedHist = [...currentLivreur.history].reverse();
                sortedHist.forEach(h => {
                    l.innerHTML += `<div style="font-size:0.75rem; background:#1a1a1a; padding:8px; margin-bottom:5px; border-left: 3px solid #28a745;">
                        <b>${h.resName}</b><br>
                        <small>${h.date} - ${h.time}</small> ✅
                    </div>`;
                });
            }
        }

        // --- CLIENT ---
        function init() { const grid = document.getElementById('res-grid');
            grid.innerHTML = ''; restaurants.forEach(res => {
                const expired = res.expiry && Date.now() > res.expiry;
                const cardStyle = expired ? 'opacity:0.4; filter:grayscale(1); pointer-events:none;' : '';
                const expiredTag = expired ? '<br><small style="color:#ff4444">INDISPONIBLE</small>' : '';
                grid.innerHTML += `<div class="card" style="${cardStyle}" onclick="${expired ? '' : `openClientMenu(${res.id})`}"><img src="${res.img || 'https://via.placeholder.com/150'}"><br><b>${res.name}</b><br><small style="color:var(--primary)">⭐ ${calcAvg(res.ratings)}</small>${expiredTag}</div>`;
            }); generatePads();
        }
        function openClientMenu(rid) { currentRes = restaurants.find(x=>x.id===rid); showSection('view-menu-client'); document.getElementById('client-res-name').innerText = `${currentRes.name} (⭐ ${calcAvg(currentRes.ratings)})`; renderClientPlats(); }

        function toggleZoom(img) {
            img.classList.toggle('zoom-image');
        }

        function renderClientPlats() { const l = document.getElementById('plats-list-client'); l.innerHTML = '';
            if(currentRes.plats) currentRes.plats.forEach(p => { const qty = cart[p.id] ? cart[p.id].qte : 0; l.innerHTML += `<div style="display:flex; align-items:center; gap:10px; background:#333; padding:10px; border-radius:10px; margin-bottom:10px"><img src="${p.img}" class="img-plat-client" onclick="toggleZoom(this)"><div style="flex:1"><b>${p.n}</b><br>${p.p} DZD <br><small>Dispo: ${p.stock}</small></div><div style="display:flex; align-items:center; gap:10px"><button onclick="changeQty(${p.id}, -1)">-</button><span>${qty}</span><button onclick="changeQty(${p.id}, 1)">+</button></div></div>`; });
        }
        
        function changeQty(pid, d) {
            pid = Number(pid);
            const p = currentRes.plats.find(x => Number(x.id) === pid);
            if(!p) return;
            if(d > 0 && p.stock <= (cart[pid]?.qte || 0)) return setNotif("STOCK ÉPUISÉ");
            if(!cart[pid]) cart[pid] = { n:p.n, p:p.p, qte:0, id: p.id };
            cart[pid].qte += d;
            if(cart[pid].qte <= 0) delete cart[pid];
            renderClientPlats();
            updateCartUI();
        }
        function updateCartUI() { const f = document.getElementById('footer-cart'), l = document.getElementById('cart-items-list');
            const keys = Object.keys(cart); if(!keys.length || !document.getElementById('view-menu-client').classList.contains('active')) { f.style.display='none'; return; } f.style.display='block'; l.innerHTML = ''; let t = 0;
            keys.forEach(k => { t += cart[k].p * cart[k].qte; l.innerHTML += `<div>${cart[k].qte}x ${cart[k].n}</div>`; }); document.getElementById('cart-total').innerText = t;
        }
        function openClientPin() { if(!document.getElementById('c-name').value) return setNotif("NOM REQUIS"); document.getElementById('client-pin-container').style.display='block'; clientTempPin=""; document.getElementById('client-pin-view').innerText=""; }
        function closeClientPin() { document.getElementById('client-pin-container').style.display='none'; }
        
        function confirmClientOrder() { 
            if(clientTempPin.length<4) return;
            const itemsList = Object.values(cart); 
            if(!currentRes.orders) currentRes.orders = []; 

            itemsList.forEach(item => {
                const plat = currentRes.plats.find(p => Number(p.id) === Number(item.id));
                if(plat) plat.stock -= item.qte;
            });
            const orderId = Date.now();
            const clientName = document.getElementById('c-name').value;
            const order = { id: orderId, client: clientName, tel: document.getElementById('c-tel').value, rawItems: itemsList, itemsText: itemsList.map(i => `${i.qte}x ${i.n}`).join(', '), total: document.getElementById('cart-total').innerText, pin: clientTempPin, status: 'new' };
            currentRes.orders.push(order);

            clientOrderTracking = {
                orderId: orderId,
                resId: currentRes.id,
                pin: clientTempPin,
                clientName: clientName
            };
            localStorage.setItem('koul_client_tracking', JSON.stringify(clientOrderTracking));

            saveRestaurant(currentRes).then(() => logResEvent(currentRes, "NOUVELLE COMMANDE", order));

            setNotif("COMMANDE RÉUSSIE"); 
            closeClientPin(); 
            goToHome();
            showOrderStatusBar('new');
        }

        // --- SUIVI COMMANDE CLIENT ---
        function loadClientOrderTracking() {
            const saved = localStorage.getItem('koul_client_tracking');
            if(saved) {
                try { clientOrderTracking = JSON.parse(saved); } catch(e) { clientOrderTracking = null; }
            }
        }

        function clearClientOrderTracking() {
            clientOrderTracking = null;
            localStorage.removeItem('koul_client_tracking');
            hideOrderStatusBar();
        }

        function updateClientOrderStatus() {
            if(!clientOrderTracking) return;
            const res = restaurants.find(r => Number(r.id) === Number(clientOrderTracking.resId));
            if(!res) return;
            const order = res.orders ? res.orders.find(o => Number(o.id) === Number(clientOrderTracking.orderId)) : null;
            if(!order) {
                // Commande disparue = livrée : déclencher le panneau de notation
                const trackingCopy = clientOrderTracking;
                clearClientOrderTracking();
                const fakeOrder = { id: trackingCopy.orderId, livId: trackingCopy.livId || null };
                showClientDeliveredFlow(res, fakeOrder);
                return;
            }
            if(order.status === 'new') showOrderStatusBar('new');
            else if(order.status === 'waiting') showOrderStatusBar('waiting');
            else if(order.status === 'shipping') {
                if(order.livId && clientOrderTracking) {
                    clientOrderTracking.livId = order.livId;
                    localStorage.setItem('koul_client_tracking', JSON.stringify(clientOrderTracking));
                }
                showOrderStatusBar('shipping');
            }
        }

        function showOrderStatusBar(status) {
            const bar = document.getElementById('order-status-bar');
            const dot = document.getElementById('status-dot');
            const label = document.getElementById('status-label');
            bar.style.display = 'flex';
            if(status === 'new') {
                dot.style.background = '#2196F3';
                label.textContent = '🔵 Votre commande est en attente de confirmation';
            } else if(status === 'waiting') {
                dot.style.background = '#FF9800';
                label.textContent = '🟠 Votre commande est en préparation';
            } else if(status === 'shipping') {
                dot.style.background = '#4CAF50';
                label.textContent = '🟢 Votre commande est en livraison';
            }
        }

        function hideOrderStatusBar() {
            document.getElementById('order-status-bar').style.display = 'none';
        }

        // --- PANNEAU NOTATION FLOTTANT CLIENT ---
        function buildStars(containerId, onSelect) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for(let i = 1; i <= 5; i++) {
                const btn = document.createElement('button');
                btn.className = 'star-btn';
                btn.textContent = '★';
                btn.dataset.val = i;
                btn.onclick = () => {
                    onSelect(i);
                    container.querySelectorAll('.star-btn').forEach(b => {
                        b.classList.toggle('lit', Number(b.dataset.val) <= i);
                    });
                };
                container.appendChild(btn);
            }
        }

        function showClientDeliveredFlow(res, order) {
            pendingRatingData = { res, order };
            ratingResVal = 0;
            ratingLivVal = 0;

            // Barre notification succès
            const bar = document.getElementById('notification-bar');
            document.getElementById('notif-message').innerText = '🎉 COMMANDE LIVRÉE !';
            bar.style.backgroundColor = '#28a745';
            bar.style.color = '#fff';
            setTimeout(() => {
                bar.style.backgroundColor = '#000';
                bar.style.color = '#ffcc00';
                document.getElementById('notif-message').innerText = promoMessage;
            }, 5000);

            hideOrderStatusBar();

            // Construire le panneau
            document.getElementById('rating-res-label').textContent = `Restaurant : ${res.name}`;
            buildStars('stars-res', (val) => { ratingResVal = val; });

            const livBlock = document.getElementById('rating-liv-block');
            if(order.livId) {
                const liv = livreurs.find(l => l.id === order.livId);
                if(liv) {
                    document.getElementById('rating-liv-label').textContent = `Livreur : ${liv.name}`;
                    buildStars('stars-liv', (val) => { ratingLivVal = val; });
                    livBlock.style.display = 'block';
                } else {
                    livBlock.style.display = 'none';
                }
            } else {
                livBlock.style.display = 'none';
            }

            document.getElementById('rating-panel').style.display = 'block';
        }

        function submitRatings() {
            if(!pendingRatingData) return;
            const { res, order } = pendingRatingData;

            if(ratingResVal >= 1 && ratingResVal <= 5) {
                if(!res.ratings) res.ratings = [];
                res.ratings.push(ratingResVal);
                logAdminEvent("CLIENT", `Note de ${ratingResVal}/5 au restaurant ${res.name}`);
                saveRestaurant(res);
            }

            if(order.livId && ratingLivVal >= 1 && ratingLivVal <= 5) {
                const liv = livreurs.find(l => l.id === order.livId);
                if(liv) {
                    if(!liv.ratings) liv.ratings = [];
                    liv.ratings.push(ratingLivVal);
                    logAdminEvent("CLIENT", `Note de ${ratingLivVal}/5 au livreur ${liv.name}`);
                    saveLivreur(liv);
                }
            }

            document.getElementById('rating-panel').style.display = 'none';
            pendingRatingData = null;
            setNotif("MERCI POUR VOS NOTES !");
        }

        function showClearConfirm(show = true) { document.getElementById('clear-confirm-panel').style.display = show ? 'block' : 'none'; }
        function toggleSec(id) { const s = document.getElementById(id); s.style.display = s.style.display==='block'?'none':'block'; }
        function logoutLivreur() { currentLivreur = null; goToHome(); }
        
        function exportHistory() { 
            let content = "HISTORIQUE COMPLET KOUL - " + new Date().toLocaleString() + "\n";
            content += "------------------------------------------------\n\n";
            adminHistory.forEach(h => {
                content += `[${h.date} ${h.time}] ${h.type}: ${h.details}\n`;
            });
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `koul_master_log_${Date.now()}.txt`;
            a.click();
            setNotif("LOGS EXPORTÉS");
        }

        loadClientOrderTracking();
        bindCloudListeners();
        init();
    </script>
